---
layout: default
---
<article class="post-header animate-fade-in stagger-1">
  <div class="post-meta">{{ page.date | date: "%B %d, %Y" }}</div>
  <h1>{{ page.title }}</h1>
</article>

<div class="post-content animate-fade-in stagger-2">
  {{ content }}
</div>

<div style="margin-top: 4rem; text-align: center;" class="animate-fade-in stagger-3">
  <a href="{{ '/' | relative_url }}" class="read-more" style="flex-direction: row-reverse;">Back to all posts</a>
</div>
